name: build-book

on:
push:
branches:
- main
workflow_dispatch:

permissions:
contents: read
pages: write
id-token: write

concurrency:
group: pages
cancel-in-progress: true

jobs:
build:
runs-on: ubuntu-latest

container:
  image: pandoc/latex:latest

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Generuj PDF
    run: |
      pandoc rozdzialy/*.md \
        --citeproc \
        --bibliography=bibliografia.bib \
        --csl=ieee.csl \
        --metadata link-citations=true \
        --toc \
        --pdf-engine=xelatex \
        -V lang=pl \
        -V geometry:margin=2.5cm \
        -o ksiazka.pdf

  - name: Przygotuj Pages
    run: |
      mkdir -p public
      cp ksiazka.pdf public/
      echo '<meta http-equiv="refresh" content="0; url=ksiazka.pdf">' > public/index.html

  - name: Upload Pages Artifact
    uses: actions/upload-pages-artifact@v3
    with:
      path: public
