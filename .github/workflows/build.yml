jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: pandoc/latex:latest

    steps:
      - uses: actions/checkout@v4

      - name: Kompilacja do PDF
        run: |
          pandoc rozdzialy/*.md \
            --citeproc \
            --bibliography=bibliografia.bib \
            --csl=ieee.csl \
            --metadata link-citations=true \
            --toc \
            --pdf-engine=xelatex \
            -V lang=pl \
            -V geometry:margin=2.5cm \
            -o ksiazka.pdf

      - name: Przygotuj Pages
        run: |
          mkdir pages
          cp ksiazka.pdf pages/
          echo "<meta http-equiv='refresh' content='0; url=ksiazka.pdf'>" > pages/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages
